name: Build Longan H618 Firmware

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: false

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
        sudo apt-get clean
        df -h

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git libncurses5-dev libssl-dev bc bison flex u-boot-tools python3 python3-dev python3-pip swig device-tree-compiler libpython3-dev cpio gawk wget unzip dosfstools mtools kmod xz-utils fakeroot

    - name: Download toolchains from Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p /tmp/assets
        gh release download toolchains --repo ${{ github.repository }} --dir /tmp/assets --pattern "*.tar.xz" --pattern "*.tar.bz2" --pattern "dtc" --pattern "rootfs.cpio.gz" --pattern "rootfs.ext4" --clobber

        mkdir -p build/toolchain
        cp /tmp/assets/gcc-arm-*.tar.xz /tmp/assets/gcc-linaro-5*.tar.* /tmp/assets/gcc-linaro-aarch64.tar.xz /tmp/assets/gcc-linaro-arm.tar.xz /tmp/assets/gcc-linaro.tar.bz2 build/toolchain/ 2>/dev/null || true

        mkdir -p brandy/brandy-2.0/tools/toolchain
        cp /tmp/assets/gcc-linaro-7*.tar.xz brandy/brandy-2.0/tools/toolchain/ 2>/dev/null || true

        mkdir -p brandy/brandy-2.0/u-boot-2018/scripts/dtc
        cp /tmp/assets/dtc brandy/brandy-2.0/u-boot-2018/scripts/dtc/
        chmod +x brandy/brandy-2.0/u-boot-2018/scripts/dtc/dtc

        cp /tmp/assets/rootfs.cpio.gz kernel/linux-5.4/

        mkdir -p test/dragonboard
        cp /tmp/assets/rootfs.ext4 test/dragonboard/

    - name: Extract toolchains
      run: |
        cd build/toolchain
        for f in *.tar.xz *.tar.bz2; do
          if [ -f "$f" ] && [ $(stat -c%s "$f") -gt 1000 ]; then
            tar -xf "$f"
          fi
        done

        cd $GITHUB_WORKSPACE/brandy/brandy-2.0/tools/toolchain
        for f in *.tar.xz; do
          if [ -f "$f" ] && [ $(stat -c%s "$f") -gt 1000 ]; then
            tar -xf "$f"
          fi
        done

    - name: Configure build
      run: |
        chmod +x build.sh
        echo -e "1\n1\n0\n0\n0" | ./build.sh config

    - name: Build bootloader
      run: ./build.sh bootloader

    - name: Build kernel
      run: ./build.sh kernel

    - name: Prepare output and fix paths
      run: |
        source .buildconfig
        
        # 创建输出目录
        mkdir -p ${LICHEE_PLAT_OUT}
        cp .buildconfig ${LICHEE_PLAT_OUT}/
        cp test/dragonboard/rootfs.ext4 ${LICHEE_PLAT_OUT}/
        
        if [ -d "out/kernel/staging" ]; then
          cp -r out/kernel/staging/* ${LICHEE_PLAT_OUT}/ 2>/dev/null || true
        fi
        
        # 修正根目录 .buildconfig 路径
        sed -i "s|/home/runner/work/Mini-LinuxPC-Pro/Mini-LinuxPC-Pro|$(pwd)|g" .buildconfig
        
        # 修正输出目录 .buildconfig 路径
        sed -i "s|/home/runner/work/Mini-LinuxPC-Pro/Mini-LinuxPC-Pro|$(pwd)|g" ${LICHEE_PLAT_OUT}/.buildconfig

    - name: Pack firmware (Docker)
      run: |
        WORKSPACE=$(pwd)
        
        docker run --rm \
          -v ${WORKSPACE}:/workspace \
          -w /workspace \
          ubuntu:22.04 \
          bash -c "
            dpkg --add-architecture i386 &&
            apt-get update &&
            apt-get install -y build-essential python3 python-is-python3 busybox dos2unix bc bison flex libssl-dev u-boot-tools cpio dosfstools mtools kmod xz-utils file libc6:i386 libstdc++6:i386 zlib1g:i386 &&
            chmod +x build.sh &&
            chmod +x build/mkcommon.sh &&
            chmod +x tools/pack/pctools/linux/fsbuild200/fsbuild &&
            chmod +x tools/pack/pctools/linux/openssl/dragonsecboot &&
            # 修正 .buildconfig 路径
            sed -i 's|/home/runner/work/Mini-LinuxPC-Pro/Mini-LinuxPC-Pro|/workspace|g' .buildconfig &&
            sed -i 's|/home/runner/work/Mini-LinuxPC-Pro/Mini-LinuxPC-Pro|/workspace|g' out/h618/p1/dragonboard/.buildconfig &&
            # 运行 config 启动 buildserver
            echo -e '1\n1\n0\n0\n0' | ./build.sh config &&
            # 运行 pack
            ./build.sh pack
          "

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: longan-h618-firmware
        path: out/pack_out/*.img
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          out/**/*.log
          out/**/build.log
        retention-days: 7
