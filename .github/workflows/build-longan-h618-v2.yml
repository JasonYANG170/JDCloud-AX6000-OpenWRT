name: Build Longan H618 Firmware

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      rootfs_type:
        description: Rootfs type
        required: false
        default: server
        type: choice
        options:
          - server
          - desktop

env:
  ROOTFS_TYPE: ${{ github.event.inputs.rootfs_type || 'server' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: false

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
        sudo apt-get clean
        df -h

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git libncurses5-dev libssl-dev bc bison flex u-boot-tools python3 python3-dev python3-pip swig device-tree-compiler libpython3-dev cpio gawk wget unzip dosfstools mtools kmod xz-utils

    - name: Download all toolchains from Release
      run: |
        TOOLCHAIN_TAG="toolchains"
        REPO="${{ github.repository }}"
        API_URL="https://api.github.com/repos/${REPO}/releases/tags/${TOOLCHAIN_TAG}"

        echo "Fetching release assets..."
        ASSETS=$(curl -s "$API_URL" | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for a in data.get('assets', []):
            print(a['name'] + '\t' + a['browser_download_url'])
        ")

        if [ -z "$ASSETS" ]; then
          echo "ERROR: Release not found!"
          exit 1
        fi

        # 下载内核工具链 (build/toolchain)
        mkdir -p build/toolchain
        cd build/toolchain
        echo "$ASSETS" | grep -E 'gcc-(arm|linaro)' | grep -v '7.2.1' | while IFS=$'\t' read name url; do
          echo "Downloading $name..."
          wget -q "$url" -O "$name"
        done
        echo "=== Kernel toolchains ==="
        ls -lh *.tar.xz *.tar.bz2 2>/dev/null

        # 下载 u-boot 工具链 (brandy/brandy-2.0/tools/toolchain)
        cd $GITHUB_WORKSPACE
        mkdir -p brandy/brandy-2.0/tools/toolchain
        cd brandy/brandy-2.0/tools/toolchain
        echo "$ASSETS" | grep '7.2.1' | while IFS=$'\t' read name url; do
          echo "Downloading $name for u-boot..."
          wget -q "$url" -O "$name"
        done
        echo "=== U-boot toolchain ==="
        ls -lh *.tar.xz 2>/dev/null

    - name: Download rootfs from Release
      run: |
        TOOLCHAIN_TAG="toolchains"
        REPO="${{ github.repository }}"
        API_URL="https://api.github.com/repos/${REPO}/releases/tags/${TOOLCHAIN_TAG}"

        cd rootfile
        ROOTFS_URL=$(curl -s "$API_URL" | python3 -c "
        import json, sys, os
        rootfs_type = os.environ.get('ROOTFS_TYPE', 'server')
        data = json.load(sys.stdin)
        for a in data.get('assets', []):
            if 'rootfs' in a['name'] and rootfs_type in a['name']:
                print(a['browser_download_url'])
                break
        ")

        if [ -z "$ROOTFS_URL" ]; then
          echo "ERROR: Rootfs not found"
          exit 1
        fi

        ROOTFS_FILE=$(basename "$ROOTFS_URL")
        echo "Downloading $ROOTFS_FILE..."
        wget -q "$ROOTFS_URL" -O "$ROOTFS_FILE"

        echo "Extracting rootfs..."
        rm -rf rootfs
        if [[ "$ROOTFS_FILE" == *.tar.gz ]]; then
          tar -zxf "$ROOTFS_FILE"
        else
          tar -xf "$ROOTFS_FILE"
        fi
        ls -la rootfs/ | head -10

    - name: Extract toolchains
      run: |
        echo "Extracting kernel toolchains..."
        cd build/toolchain
        for f in *.tar.xz *.tar.bz2; do
          if [ -f "$f" ] && [ $(stat -c%s "$f") -gt 1000 ]; then
            echo "  $f"
            tar -xf "$f"
          fi
        done

        echo "Extracting u-boot toolchain..."
        cd $GITHUB_WORKSPACE/brandy/brandy-2.0/tools/toolchain
        for f in *.tar.xz; do
          if [ -f "$f" ] && [ $(stat -c%s "$f") -gt 1000 ]; then
            echo "  $f"
            tar -xf "$f"
          fi
        done
        ls -la

    - name: Configure build
      run: |
        chmod +x build.sh
        echo -e "1\n1\n0\n0\n0" | ./build.sh config

    - name: Build bootloader
      run: ./build.sh bootloader

    - name: Build kernel
      run: ./build.sh kernel

    - name: Build rootfs
      run: ./build.sh rootfs

    - name: Pack firmware
      run: ./build.sh pack

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: longan-h618-${{ env.ROOTFS_TYPE }}-firmware
        path: out/pack_out/*.img
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          out/**/*.log
          out/**/build.log
        retention-days: 7
