name: Build Longan H618 Firmware

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: false

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
        sudo apt-get clean
        df -h

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git libncurses5-dev libssl-dev bc bison flex u-boot-tools python3 python3-dev python3-pip swig device-tree-compiler libpython3-dev cpio gawk wget unzip dosfstools mtools kmod xz-utils fakeroot

    - name: Download toolchains from Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p /tmp/assets
        gh release download toolchains --repo ${{ github.repository }} --dir /tmp/assets --pattern "*.tar.xz" --pattern "*.tar.bz2" --pattern "dtc" --pattern "rootfs.cpio.gz" --pattern "rootfs.ext4" --clobber

        echo "=== Downloaded ==="
        ls -lh /tmp/assets/

        # 内核工具链
        mkdir -p build/toolchain
        cp /tmp/assets/gcc-arm-*.tar.xz /tmp/assets/gcc-linaro-5*.tar.* /tmp/assets/gcc-linaro-aarch64.tar.xz /tmp/assets/gcc-linaro-arm.tar.xz /tmp/assets/gcc-linaro.tar.bz2 build/toolchain/ 2>/dev/null || true

        # u-boot 工具链
        mkdir -p brandy/brandy-2.0/tools/toolchain
        cp /tmp/assets/gcc-linaro-7*.tar.xz brandy/brandy-2.0/tools/toolchain/ 2>/dev/null || true

        # dtc
        mkdir -p brandy/brandy-2.0/u-boot-2018/scripts/dtc
        cp /tmp/assets/dtc brandy/brandy-2.0/u-boot-2018/scripts/dtc/
        chmod +x brandy/brandy-2.0/u-boot-2018/scripts/dtc/dtc

        # rootfs.cpio.gz (ramdisk)
        cp /tmp/assets/rootfs.cpio.gz kernel/linux-5.4/

        # rootfs.ext4 (预构建)
        mkdir -p test/dragonboard
        cp /tmp/assets/rootfs.ext4 test/dragonboard/

        echo "=== Placed ==="
        echo "Toolchains:"; ls build/toolchain/ | head -5
        echo "U-boot TC:"; ls brandy/brandy-2.0/tools/toolchain/
        echo "DTC:"; file brandy/brandy-2.0/u-boot-2018/scripts/dtc/dtc
        echo "Ramdisk:"; file kernel/linux-5.4/rootfs.cpio.gz
        echo "Rootfs.ext4:"; ls -lh test/dragonboard/rootfs.ext4

    - name: Extract toolchains
      run: |
        echo "Extracting kernel toolchains..."
        cd build/toolchain
        for f in *.tar.xz *.tar.bz2; do
          if [ -f "$f" ] && [ $(stat -c%s "$f") -gt 1000 ]; then
            echo "  $f"
            tar -xf "$f"
          fi
        done

        echo "Extracting u-boot toolchain..."
        cd $GITHUB_WORKSPACE/brandy/brandy-2.0/tools/toolchain
        for f in *.tar.xz; do
          if [ -f "$f" ] && [ $(stat -c%s "$f") -gt 1000 ]; then
            echo "  $f"
            tar -xf "$f"
          fi
        done

    - name: Configure build
      run: |
        chmod +x build.sh
        echo -e "1\n1\n0\n0\n0" | ./build.sh config

    - name: Build bootloader
      run: ./build.sh bootloader

    - name: Build kernel
      run: ./build.sh kernel

    - name: Copy rootfs to output
      run: |
        # 读取配置获取输出目录
        source .buildconfig
        mkdir -p ${LICHEE_PLAT_OUT}
        cp test/dragonboard/rootfs.ext4 ${LICHEE_PLAT_OUT}/
        echo "Copied rootfs.ext4 to ${LICHEE_PLAT_OUT}/"
        ls -lh ${LICHEE_PLAT_OUT}/rootfs.ext4

    - name: Pack firmware
      run: ./build.sh pack

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: longan-h618-firmware
        path: out/pack_out/*.img
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          out/**/*.log
          out/**/build.log
        retention-days: 7
